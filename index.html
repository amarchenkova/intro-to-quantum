<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro to Quantum</title>
<meta name="description" content="Visualizations, images, and embeds for the Intro to Quantum Substack.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080e;--s1:#0f0f17;--b0:rgba(255,255,255,.06);--b1:rgba(255,255,255,.11);--tx:#e8e8f2;--mu:rgba(232,232,242,.42);--ac:#6d5ffa;}
body{background:var(--bg);font-family:"IBM Plex Mono",monospace;color:var(--tx);min-height:100vh;}
.wrap{max-width:780px;margin:0 auto;padding:3rem 2rem;}
.brand{font-size:9px;letter-spacing:.18em;color:var(--ac);text-transform:uppercase;margin-bottom:8px;}
h1{font-family:"Syne",sans-serif;font-size:clamp(22px,4vw,34px);font-weight:700;letter-spacing:-.02em;margin-bottom:12px;}
.sub{font-size:12px;color:var(--mu);line-height:1.7;max-width:560px;margin-bottom:2.5rem;}
.sub a{color:var(--tx);border-bottom:1px solid var(--b1);text-decoration:none;}
.sub a:hover{color:var(--ac);border-color:var(--ac);}
h2{font-family:"Syne",sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin:2rem 0 .75rem;font-weight:700;}
ul{list-style:none;}
li{border-top:1px solid var(--b0);padding:.9rem 0;}
li:last-child{border-bottom:1px solid var(--b0);}
li a{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;color:var(--tx);text-decoration:none;}
li a:hover .t{color:var(--ac);}
.t{font-size:14px;font-weight:500;transition:color .12s;}
.d{font-size:9px;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;white-space:nowrap;}
footer{margin-top:4rem;font-size:9px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">
<div class="brand">introtoquantum.com</div>
<h1>Intro to Quantum</h1>
<p class="sub">Interactive visualizations and image assets for the <a href="https://introtoquantum.substack.com" target="_blank" rel="noopener">Intro to Quantum</a> Substack.</p>

<h2>Embeds</h2>
<ul>
  <li><a href="embeds/quantum-landscape.html"><span class="t">Every Superconducting Quantum Company in the World, 2026</span><span class="d">Apr 2026</span></a></li>
</ul>

<footer>Strange Quark Capital</footer>
</div>
</body>
</html>
